name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint (Biome)
        run: pnpm lint
      - name: Format (Biome)
        run: pnpm format:check
      - name: Typecheck
        run: pnpm typecheck
      - name: Knip (unused code)
        run: pnpm knip
      - name: Dependency Cruiser (architecture)
        run: pnpm depcheck
      - name: Build
        run: pnpm build
